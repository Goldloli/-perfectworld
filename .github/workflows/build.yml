name: Build Dota2 Launcher

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller Pillow

    - name: Generate icon
      run: |
        python -c "
from PIL import Image, ImageDraw

# 创建 256x256 的图标
img = Image.new('RGBA', (256, 256), (30, 30, 46, 0))
draw = ImageDraw.Draw(img)

# 背景圆形
draw.ellipse([10, 10, 246, 246], outline=(122, 162, 247), width=12)

# 中心三角形（Dota 风格）
triangle = [(128, 50), (200, 180), (56, 180)]
draw.polygon(triangle, fill=(122, 162, 247))

# 中心小圆
draw.ellipse([100, 110, 156, 166], fill=(30, 30, 46))

# 保存为多尺寸 ICO
img.save('icon.ico', sizes=[(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)])
print('Icon generated: icon.ico')
"

    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name "Dota2Launcher" --icon=icon.ico gui_launcher.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Dota2国服启动器
        path: dist/Dota2Launcher.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/Dota2Launcher.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
